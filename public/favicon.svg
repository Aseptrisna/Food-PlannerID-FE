<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)"/>

  <!-- Plate -->
  <circle cx="50" cy="55" r="28" fill="white" opacity="0.95"/>
  <circle cx="50" cy="55" r="24" fill="none" stroke="#10b981" stroke-width="2"/>

  <!-- Fork (left) -->
  <g fill="white">
    <rect x="35" y="25" width="2" height="18" rx="1"/>
    <rect x="32" y="23" width="2" height="12" rx="1"/>
    <rect x="38" y="23" width="2" height="12" rx="1"/>
  </g>

  <!-- Spoon (right) -->
  <g fill="white">
    <ellipse cx="65" cy="28" rx="3" ry="4"/>
    <rect x="64" y="30" width="2" height="13" rx="1"/>
  </g>

  <!-- Food on plate (simple rice/meal representation) -->
  <circle cx="50" cy="53" r="8" fill="#10b981" opacity="0.6"/>
  <circle cx="46" cy="56" r="4" fill="#059669" opacity="0.7"/>
  <circle cx="54" cy="56" r="4" fill="#059669" opacity="0.7"/>
</svg>
